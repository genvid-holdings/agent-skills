# storyboard_write is agent-authored composition (#1821, #1667). Per-method risk:
# compose = destructive (full create/replace, pre-cert); insert = additive
# (change-order, post-cert). Every shot carries a content anchor (provenance.quote)
# the boundary resolves to block ids fail-fast.
- name: storyboard_write
  classification: destructive
  status: live
  params: [method, project_id, scenes, scene_id, beat, shots]
  skill: genvid-scene-shot-design

